<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>e-Postit Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
    <h1 class="text-4xl font-black mb-10 italic text-center tracking-tighter">e-POSTIT</h1>
    <input type="text"     id="auth-name"  placeholder="Nom complet" class="hidden">
    <input type="email"    id="auth-email" placeholder="Email">
    <input type="password" id="auth-pass"  placeholder="Mot de passe">
    <button onclick="handleAuth()" id="auth-btn" class="btn-black h-14 mt-4 text-lg">Connexion</button>
    <p class="text-center mt-6 text-[10px] uppercase font-black cursor-pointer opacity-50"
       onclick="toggleAuthMode()" id="auth-toggle">Pas de compte ? Créer un compte</p>
</div>

<!-- HEADER FIXE (réductible) -->
<div class="fixed-header" id="fixed-header">
    <!-- Ligne principale : titre | tuiles postits | bouton ⏏ -->
    <div style="display:flex; align-items:center; width:100%; gap:6px; min-height:40px;">
        <!-- Titre de page (masqué sur le chat) — cliquable pour replier -->
        <div id="header-title-wrap" style="flex-shrink:0; display:flex; align-items:center; gap:5px; cursor:pointer;" onclick="toggleHeader()">
            <h2 id="page-title" class="font-black italic uppercase" style="margin:0; font-size:15px; white-space:nowrap;">Groupes</h2>
            <span id="header-toggle-icon" style="font-size:11px; opacity:0.35;">▲</span>
        </div>
        <!-- Tuiles postits (page Chat uniquement) -->
        <div id="header-postit-tabs"
             style="flex:1; display:none; overflow-x:auto; -webkit-overflow-scrolling:touch;
                    scrollbar-width:none; gap:5px; align-items:stretch; min-width:0;">
        </div>
        <!-- Espace flexible pour pousser ⏏ à droite sur pages non-chat -->
        <div id="header-spacer" style="flex:1;"></div>
        <!-- Bouton déconnexion toujours à droite -->
        <button onclick="logout()"
                style="flex-shrink:0; font-size:15px; background:var(--accent); color:white;
                       border:none; cursor:pointer; padding:5px 9px; margin-left:4px;">⏏</button>
    </div>
    <!-- Ligne masquable : nom utilisateur connecté -->
    <div id="header-details" style="width:100%; padding-top:3px; border-top:1px solid rgba(0,0,0,0.08);">
        <div id="user-badge" style="font-size:8px; font-weight:900; opacity:0.45; text-transform:uppercase; cursor:pointer;" onclick="toggleHeader()">
            👤 <span id="user-name-display">…</span>
            <span id="header-toggle-icon2" style="opacity:0.4; margin-left:4px; font-size:10px;">▲</span>
        </div>
    </div>
</div>
<!-- Spans cachés compatibilité JS -->
<span id="st-grp-mini" style="display:none;"></span>
<span id="st-grp"      style="display:none;"></span>
<span id="st-dev"      style="display:none;"></span>
<span id="st-pos"      style="display:none;"></span>
<div  id="status-mini" style="display:none;"></div>

<!-- VIEWPORT : 5 pages (0-4) -->
<div id="viewport">

    <!-- P0 : ARCHIVES -->
    <div class="page px-5 pt-24" id="p0">
        <select id="arch-group" onchange="loadArchDevices(this.value)"
                class="w-full p-3 border-2 border-black font-black text-xs uppercase bg-white shadow-[2px_2px_0px_#000]"></select>
        <div class="flex gap-2 mt-2">
            <select id="arch-dev" onchange="loadArchPostits(this.value)"
                    class="flex-1 p-3 border-2 border-black font-black text-xs uppercase bg-white shadow-[2px_2px_0px_#000]">
                <option value="">-- Display --</option>
            </select>
            <select id="arch-pos" onchange="refreshArchiveView()"
                    class="flex-1 p-3 border-2 border-black font-black text-xs uppercase bg-white shadow-[2px_2px_0px_#000]">
                <option value="">-- Post-it --</option>
            </select>
        </div>
        <div id="archive-content" class="mt-4 overflow-y-auto bg-white/30 border-2 border-black/5"
             style="height:calc(100vh - 380px)">
            <p class="text-center opacity-30 italic text-[10px] uppercase font-black mt-10">
                Sélectionnez un post-it pour voir l'historique</p>
        </div>
        <div class="mt-4 pb-20">
            <button onclick="backupCurrentPostit()"
                    class="w-full bg-black text-white p-4 font-black uppercase text-xs shadow-[4px_4px_0px_#ccc]">
                💾 Sauvegarder le Chat actuel</button>
        </div>
    </div>

    <!-- P1 : PARAMÈTRES + MEMBRES -->
    <div class="page" id="p1">
        <!-- Groupes -->
        <div class="acc-item">
            <input type="checkbox" id="check-g" class="acc-trigger" checked>
            <div class="acc-header">
                <div class="acc-title-zone">
                    <label for="check-g" class="acc-label-text">Groupes</label>
                    <button onclick="uiCreateGroup(event)" class="btn-plus-3d">+</button>
                </div>
                <label for="check-g" class="acc-toggle-icon"></label>
            </div>
            <div class="acc-content"><div id="list-groups-del"></div></div>
        </div>
        <!-- Rayons (masqué si groupe perso) -->
        <div class="acc-item" id="acc-rayons" style="display:none;">
            <input type="checkbox" id="check-d" class="acc-trigger">
            <div class="acc-header">
                <div class="acc-title-zone">
                    <label for="check-d" class="acc-label-text">Rayons</label>
                    <button onclick="uiCreateDevice(event)" class="btn-plus-3d">+</button>
                </div>
                <label for="check-d" class="acc-toggle-icon"></label>
            </div>
            <div class="acc-content"><div id="list-devs-del"></div></div>
        </div>
        <!-- Post-its -->
        <div class="acc-item">
            <input type="checkbox" id="check-p" class="acc-trigger">
            <div class="acc-header">
                <div class="acc-title-zone">
                    <label for="check-p" class="acc-label-text">Post-its</label>
                    <button onclick="uiCreatePostit(event)" class="btn-plus-3d">+</button>
                </div>
                <label for="check-p" class="acc-toggle-icon"></label>
            </div>
            <div class="acc-content"><div id="list-postits-del"></div></div>
        </div>
        <!-- Membres (masqué si simple participant) -->
        <div class="acc-item" id="acc-membres">
            <input type="checkbox" id="check-m" class="acc-trigger">
            <div class="acc-header">
                <div class="acc-title-zone">
                    <label for="check-m" class="acc-label-text">Membres</label>
                    <button onclick="uiInviteMember(event)" class="btn-plus-3d">+</button>
                </div>
                <label for="check-m" class="acc-toggle-icon"></label>
            </div>
            <div class="acc-content"><div id="list-members"></div></div>
        </div>
        <!-- Skin / Apparence -->
        <div class="acc-item">
            <input type="checkbox" id="check-skin" class="acc-trigger">
            <div class="acc-header">
                <label for="check-skin" class="acc-label-text">🎨 Apparence</label>
                <label for="check-skin" class="acc-toggle-icon"></label>
            </div>
            <div class="acc-content">
                <!-- Sélecteur 3 thèmes -->
                <div id="skin-selector" style="display:flex;gap:6px;margin-bottom:12px;">
                    <button class="skin-btn active" onclick="applySkin(0)">Défaut</button>
                    <button class="skin-btn" onclick="applySkin(1)">Ardoise</button>
                    <button class="skin-btn" onclick="applySkin(2)">Perso</button>
                </div>

                <!-- Pickers couleurs personnalisées -->
                <div id="skin-color-pickers" style="display:none;">
                    <div style="font-size:8px;font-weight:900;text-transform:uppercase;opacity:0.5;margin-bottom:8px;">Couleurs personnalisées</div>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                        <label style="display:flex;flex-direction:column;gap:3px;font-size:9px;font-weight:900;text-transform:uppercase;">
                            Fond
                            <input type="color" id="c-bg" value="#efeee9" oninput="applyCustomColors()" style="width:100%;height:28px;border:2px solid #18181b;padding:0;cursor:pointer;">
                        </label>
                        <label style="display:flex;flex-direction:column;gap:3px;font-size:9px;font-weight:900;text-transform:uppercase;">
                            Accent / Bordures
                            <input type="color" id="c-accent" value="#18181b" oninput="applyCustomColors()" style="width:100%;height:28px;border:2px solid #18181b;padding:0;cursor:pointer;">
                        </label>
                        <label style="display:flex;flex-direction:column;gap:3px;font-size:9px;font-weight:900;text-transform:uppercase;">
                            Texte
                            <input type="color" id="c-text" value="#18181b" oninput="applyCustomColors()" style="width:100%;height:28px;border:2px solid #18181b;padding:0;cursor:pointer;">
                        </label>
                        <label style="display:flex;flex-direction:column;gap:3px;font-size:9px;font-weight:900;text-transform:uppercase;">
                            Champs / Selects
                            <input type="color" id="c-field" value="#ffffff" oninput="applyCustomColors()" style="width:100%;height:28px;border:2px solid #18181b;padding:0;cursor:pointer;">
                        </label>
                        <label style="display:flex;flex-direction:column;gap:3px;font-size:9px;font-weight:900;text-transform:uppercase;">
                            Boutons fond
                            <input type="color" id="c-btn-bg" value="#18181b" oninput="applyCustomColors()" style="width:100%;height:28px;border:2px solid #18181b;padding:0;cursor:pointer;">
                        </label>
                        <label style="display:flex;flex-direction:column;gap:3px;font-size:9px;font-weight:900;text-transform:uppercase;">
                            Boutons texte
                            <input type="color" id="c-btn-text" value="#ffffff" oninput="applyCustomColors()" style="width:100%;height:28px;border:2px solid #18181b;padding:0;cursor:pointer;">
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- P2 : LISTE DES GROUPES -->
    <div class="page pt-24 px-4" id="p2">
        <div id="groups-list-container">
            <p class="text-center opacity-30 italic text-[10px] uppercase font-black mt-10">Chargement…</p>
        </div>
    </div>

    <!-- P3 : CHAT -->
    <div class="page px-0 pt-24" id="p3"
         style="display:flex; flex-direction:column; overflow:hidden; padding-bottom:130px !important;">

        <!-- tuiles postits maintenant dans fixed-header -->
        <div id="postit-tabs" style="display:none;"></div>

        <!-- Alerte date manquante (Pro uniquement) -->
        <div id="order-date-alert" style="display:none; background:#dc2626; color:white; padding:5px 10px; font-size:9px; font-weight:900; text-transform:uppercase; flex-shrink:0;">
            ⚠️ Aucune date de retrait — commande non préparable
        </div>

        <!-- Bandeau infos commande Pro (accordéon) -->
        <div id="order-banner" style="display:none; flex-shrink:0; padding:0 8px; margin-top:4px;">
            <div class="acc-item" style="border:2px solid var(--accent);">
                <input type="checkbox" id="check-order-banner" class="acc-trigger">
                <div class="acc-header" style="padding:4px 8px; background:white;">
                    <label for="check-order-banner" class="acc-label-text" style="font-size:0.65rem;">📦 Infos commande</label>
                    <label for="check-order-banner" class="acc-toggle-icon"></label>
                </div>
                <div class="acc-content" id="order-banner-content" style="padding:0;"></div>
            </div>
        </div>

        <!-- Mini eink (accordéon) -->
        <div class="acc-item" id="acc-eink" style="flex-shrink:0; border-bottom:none; padding:0 8px;">
            <input type="checkbox" id="check-eink" class="acc-trigger">
            <div class="acc-header" style="padding:3px 0;">
                <label for="check-eink" class="acc-label-text" style="font-size:0.6rem;">📋 Résumé</label>
                <div style="display:flex; align-items:center; gap:4px;">
                    <button onclick="goToPage(4); event.stopPropagation();"
                            style="background:#eff6ff; color:#2563eb; padding:3px 5px; border:1px solid #bfdbfe; font-size:10px; cursor:pointer;">⤢</button>
                    <label for="check-eink" class="acc-toggle-icon" style="width:auto;"></label>
                </div>
            </div>
            <div class="acc-content" style="padding-bottom:4px;">
                <div id="eink-sim" class="border-4 border-black bg-white font-mono text-[10px]"
                     style="height:80px; overflow-y:auto; word-break:break-word; overflow-wrap:break-word; padding:6px;"></div>
            </div>
        </div>

        <!-- Historique messages -->
        <div id="chat-history" style="padding:0 8px;"></div>

        <!-- Sélects cachés (compatibilité JS) -->
        <select id="sel-dev" style="display:none;"></select>
        <select id="sel-pos" style="display:none;"></select>
        <input type="date" id="filter-date" style="display:none;">
    </div>

    <!-- P4 : PREP (eink agrandi) -->
    <div class="page bg-white" id="p4" style="padding:10px !important;">
        <div class="h-full flex flex-col">
            <div id="prep-header"></div>
            <div id="prep-content"
                 class="flex-grow mt-2 font-mono text-black border-4 border-black p-4 overflow-y-auto bg-white"
                 style="font-size:clamp(14px,4vw,28px); word-break:break-word; overflow-wrap:break-word; padding-bottom:150px !important;"></div>
        </div>
    </div>

</div><!-- fin viewport -->

<!-- BARRE DE SAISIE -->
<div id="message-bar" class="send-container" style="display:none;">
    <div id="upload-menu" class="hidden"
         style="position:absolute; bottom:60px; left:10px; background:white; border:2px solid black; z-index:100; padding:5px;">
        <button onclick="triggerUpload('camera')"
                style="display:block; width:100%; padding:10px; font-weight:900; font-size:10px; text-transform:uppercase; border-bottom:1px solid #eee; text-align:left;">
            📸 Ticket de caisse</button>
        <button onclick="triggerUpload('file')"
                style="display:block; width:100%; padding:10px; font-weight:900; font-size:10px; text-transform:uppercase; text-align:left;">
            📂 Ajouter un document</button>
    </div>
    <button onclick="toggleUploadMenu()" class="btn-send"
            style="display:flex; align-items:center; justify-content:center; flex-shrink:0;">
        <span style="font-size:18px; line-height:1;">📎</span>
    </button>
    <textarea id="msg-input" placeholder="Écrire un message…" style="flex:1; margin:0 5px;"></textarea>
    <button onclick="send()" class="btn-send"
            style="display:flex; align-items:center; justify-content:center; flex-shrink:0;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
    </button>
    <input type="file" id="up-camera" accept="image/*" capture="environment" class="hidden" onchange="uploadFile(this)">
    <input type="file" id="up-file"   accept="image/*" class="hidden" onchange="uploadFile(this)">
</div>

<!-- MODAL COMMANDE -->
<div id="order-modal" class="hidden fixed inset-0 bg-black/80 z-[3000] flex items-center justify-center p-4">
    <div class="bg-[#efeee9] border-4 border-black p-6 w-full max-w-md shadow-[8px_8px_0px_#000]">
        <h2 id="order-modal-title" class="text-2xl font-black uppercase mb-4 italic">Nouvelle Commande</h2>
        <div class="space-y-3">
            <input type="text" id="order-client" placeholder="Nom *" class="w-full p-2 border-2 border-black font-bold">
            <div id="order-pro-fields">
                <input type="text" id="order-num" placeholder="N° Commande (optionnel)"
                       class="w-full p-2 border-2 border-black font-bold mb-2">
                <div class="flex gap-2">
                    <input type="tel"            id="order-phone" placeholder="Téléphone"
                           class="flex-1 p-2 border-2 border-black font-bold">
                    <input type="datetime-local" id="order-date"
                           class="flex-1 p-2 border-2 border-black font-bold">
                </div>
            </div>
        </div>
        <div class="mt-5 flex gap-2">
            <button onclick="closeOrderModal()"
                    class="flex-1 p-3 border-2 border-black font-black uppercase text-xs bg-white">Annuler</button>
            <button onclick="submitOrder()"
                    class="flex-1 p-3 bg-black text-white font-black uppercase text-xs shadow-[4px_4px_0px_#ccc]">Créer</button>
        </div>
    </div>
</div>

<!-- MODAL PROMPT GÉNÉRIQUE -->
<div id="custom-prompt-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[9999]">
    <div class="bg-white p-6 shadow-xl w-80">
        <h3 id="prompt-title" class="text-sm font-bold uppercase mb-4 text-gray-700">Modifier</h3>
        <input type="text" id="prompt-input" class="w-full border p-2 mb-4 focus:outline-none text-sm">
        <div class="flex justify-end gap-2">
            <button onclick="closeCustomPrompt()" class="px-4 py-2 text-xs uppercase font-bold text-gray-500">Annuler</button>
            <button id="prompt-confirm-btn" class="px-4 py-2 text-xs uppercase font-bold bg-black text-white">Valider</button>
        </div>
    </div>
</div>

<!-- sel-group caché (compatibilité app.js) -->
<select id="sel-group" onchange="syncSelection('group', this.value)" style="display:none;"></select>

<!-- NAV BAS : 4 onglets -->
<nav class="tab-bar">
    <div class="tab-item" onclick="goToPage(0)"><span>📚</span><span>Archives</span></div>
    <div class="tab-item" onclick="goToPage(1)"><span>⚙️</span><span>Params</span></div>
    <div class="tab-item active" onclick="goToPage(2)"><span>👥</span><span>Groupes</span></div>
    <div class="tab-item" onclick="goToPage(3)"><span>💬</span><span>Chat</span></div>
</nav>

<script src="js/auth.js"></script>
<script src="js/navigation.js"></script>
<script src="js/app.js"></script>
<script src="js/archives.js"></script>
</body>
</html>
